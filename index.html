<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkySense • Professional Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

:root {
--primary: #3b82f6;
--primary-dark: #2563eb;
--primary-glow: rgba(59, 130, 246, 0.5);
--bg-start: #0b1120;
--bg-end: #1a2a4a;
--glass: rgba(255, 255, 255, 0.07);
--glass-border: rgba(255, 255, 255, 0.1);
--glass-hover: rgba(255, 255, 255, 0.12);
--text-primary: #ffffff;
--text-secondary: #94a3b8;
--text-muted: #64748b;
--radius-xl: 32px;
--radius-lg: 24px;
--radius-md: 18px;
--shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.5);
--shadow-glow: 0 0 30px var(--primary-glow);
--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
font-family: 'Inter', sans-serif;
background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
color: var(--text-primary);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
position: relative;
overflow-x: hidden;
}

/* Animated background */
body::before {
content: '';
position: fixed;
width: 100%;
height: 100%;
background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
radial-gradient(circle at 70% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 50%);
animation: pulse 8s ease-in-out infinite;
pointer-events: none;
}

@keyframes pulse {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* Floating particles */
.particle {
position: fixed;
background: rgba(255, 255, 255, 0.03);
border-radius: 50%;
pointer-events: none;
}

.particle1 {
width: 300px;
height: 300px;
top: -100px;
right: -100px;
background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
animation: float-particle 15s infinite alternate;
}

.particle2 {
width: 400px;
height: 400px;
bottom: -150px;
left: -150px;
background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
animation: float-particle 20s infinite alternate-reverse;
}

@keyframes float-particle {
0% { transform: translate(0, 0) scale(1); }
100% { transform: translate(30px, 30px) scale(1.1); }
}

/* Main card */
.main-card {
width: 100%;
max-width: 580px;
background: var(--glass);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-radius: var(--radius-xl);
padding: 40px 35px;
box-shadow: var(--shadow);
border: 1px solid var(--glass-border);
animation: fadeIn 0.8s ease-out;
transition: var(--transition);
}

.main-card:hover {
box-shadow: var(--shadow), var(--shadow-glow);
border-color: rgba(59, 130, 246, 0.3);
}

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(30px) scale(0.95);
}
to {
opacity: 1;
transform: translateY(0) scale(1);
}
}

/* Header */
.header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 30px;
}

.logo {
font-weight: 700;
font-size: 24px;
letter-spacing: -0.5px;
background: linear-gradient(135deg, #fff, #94a3b8);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.logo i {
color: var(--primary);
margin-right: 8px;
-webkit-text-fill-color: initial;
}

.city-badge {
background: linear-gradient(135deg, var(--primary), var(--primary-dark));
padding: 10px 22px;
border-radius: 40px;
font-size: 15px;
font-weight: 600;
letter-spacing: 0.3px;
box-shadow: 0 8px 20px -5px var(--primary-dark);
display: inline-flex;
align-items: center;
gap: 8px;
}

.refresh-btn {
background: rgba(255, 255, 255, 0.1);
border: 1px solid rgba(255, 255, 255, 0.15);
color: var(--text-primary);
width: 45px;
height: 45px;
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
margin-left: 10px;
transition: var(--transition);
cursor: pointer;
}

.refresh-btn:hover {
background: var(--primary);
transform: rotate(180deg) scale(1.1);
border-color: transparent;
box-shadow: 0 0 20px var(--primary-glow);
}

/* Weather icon */
.icon-wrapper {
text-align: center;
margin: 15px 0 10px;
position: relative;
}

.icon-wrapper i {
font-size: 130px;
color: var(--text-primary);
filter: drop-shadow(0 10px 30px rgba(59, 130, 246, 0.5));
animation: float 4s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-15px); }
}

/* Temperature */
.temperature {
font-size: 80px;
font-weight: 700;
text-align: center;
line-height: 1;
margin: 15px 0 5px;
background: linear-gradient(135deg, #fff, #cbd5e1);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.description {
text-align: center;
color: var(--text-secondary);
font-size: 20px;
font-weight: 500;
margin-bottom: 35px;
text-transform: capitalize;
letter-spacing: 0.5px;
}

/* Stats grid */
.stats-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 16px;
margin-bottom: 30px;
}

.stat-card {
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(255, 255, 255, 0.08);
border-radius: var(--radius-lg);
padding: 22px 15px;
text-align: center;
transition: var(--transition);
position: relative;
overflow: hidden;
}

.stat-card::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, var(--primary), transparent);
transform: translateX(-100%);
transition: transform 0.6s;
}

.stat-card:hover {
background: var(--glass-hover);
border-color: rgba(59, 130, 246, 0.3);
transform: translateY(-5px);
box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
}

.stat-card:hover::before {
transform: translateX(100%);
}

.stat-card i {
font-size: 28px;
color: var(--primary);
margin-bottom: 10px;
background: rgba(59, 130, 246, 0.15);
width: 55px;
height: 55px;
line-height: 55px;
border-radius: 50%;
margin: 0 auto 12px;
}

.stat-label {
color: var(--text-secondary);
font-size: 13px;
font-weight: 500;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 6px;
}

.stat-value {
color: var(--text-primary);
font-size: 26px;
font-weight: 700;
}

.stat-unit {
color: var(--text-muted);
font-size: 14px;
font-weight: 400;
margin-left: 3px;
}

/* Search section */
.search-wrapper {
margin-top: 25px;
position: relative;
}

.search-box {
display: flex;
gap: 12px;
}

.search-input {
flex: 1;
padding: 16px 22px;
border: 1px solid rgba(255, 255, 255, 0.1);
background: rgba(255, 255, 255, 0.05);
border-radius: 50px;
color: var(--text-primary);
font-size: 16px;
font-weight: 500;
transition: var(--transition);
}

.search-input:focus {
outline: none;
border-color: var(--primary);
background: rgba(255, 255, 255, 0.1);
box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

.search-input::placeholder {
color: var(--text-muted);
font-weight: 400;
}

.search-btn {
padding: 16px 32px;
border: none;
background: linear-gradient(135deg, var(--primary), var(--primary-dark));
color: white;
font-weight: 600;
border-radius: 50px;
cursor: pointer;
transition: var(--transition);
box-shadow: 0 8px 20px -5px var(--primary-dark);
white-space: nowrap;
}

.search-btn:hover {
transform: scale(1.05);
box-shadow: 0 12px 25px -5px var(--primary-dark);
}

.search-btn:active {
transform: scale(0.98);
}

/* Popular cities */
.popular-cities {
display: flex;
flex-wrap: wrap;
gap: 10px;
justify-content: center;
margin-top: 22px;
}

.city-tag {
padding: 8px 18px;
background: rgba(255, 255, 255, 0.06);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 40px;
color: var(--text-secondary);
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: var(--transition);
}

.city-tag:hover {
background: var(--primary);
border-color: var(--primary);
color: white;
transform: translateY(-2px);
box-shadow: 0 8px 15px -5px var(--primary-dark);
}

.city-tag i {
margin-right: 6px;
font-size: 12px;
opacity: 0.8;
}

/* Last updated */
.last-updated {
margin-top: 25px;
padding-top: 20px;
border-top: 1px solid rgba(255, 255, 255, 0.1);
text-align: center;
color: var(--text-muted);
font-size: 13px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.last-updated i {
color: var(--primary);
}

/* Loading state */
.loading {
opacity: 0.6;
pointer-events: none;
position: relative;
}

.loading::after {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
0% { transform: translateX(-100%); }
100% { transform: translateX(100%); }
}

/* Error message */
.error-toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
background: rgba(239, 68, 68, 0.9);
backdrop-filter: blur(10px);
color: white;
padding: 14px 28px;
border-radius: 50px;
font-weight: 500;
box-shadow: 0 10px 40px rgba(239, 68, 68, 0.3);
border: 1px solid rgba(255, 255, 255, 0.2);
z-index: 1000;
animation: slideUp 0.3s ease;
}

@keyframes slideUp {
from {
opacity: 0;
transform: translate(-50%, 20px);
}
to {
opacity: 1;
transform: translate(-50%, 0);
}
}

/* Tooltip */
.tooltip {
position: relative;
}

.tooltip:hover::after {
content: attr(data-tooltip);
position: absolute;
bottom: 100%;
left: 50%;
transform: translateX(-50%);
background: rgba(0, 0, 0, 0.8);
color: white;
padding: 6px 12px;
border-radius: 6px;
font-size: 12px;
white-space: nowrap;
margin-bottom: 8px;
}
</style>
</head>
<body>

<!-- Background particles -->
<div class="particle particle1"></div>
<div class="particle particle2"></div>

<div class="main-card" id="card">
  
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <i class="fas fa-cloud-moon"></i> SkySense
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <span class="city-badge" id="city">
        <i class="fas fa-map-pin"></i> London
      </span>
      <button class="refresh-btn" onclick="refreshWeather()" data-tooltip="Refresh data">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </div>

  <!-- Weather Icon -->
  <div class="icon-wrapper">
    <i class="fas fa-cloud-sun" id="icon"></i>
  </div>

  <!-- Temperature & Description -->
  <div class="temperature" id="temp">--°C</div>
  <div class="description" id="desc">Fetching forecast...</div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-thermometer-half"></i>
      <div class="stat-label">Feels Like</div>
      <div class="stat-value" id="feels">--<span class="stat-unit">°C</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-tint"></i>
      <div class="stat-label">Humidity</div>
      <div class="stat-value" id="hum">--<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-wind"></i>
      <div class="stat-label">Wind Speed</div>
      <div class="stat-value" id="wind">--<span class="stat-unit">m/s</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-compress-alt"></i>
      <div class="stat-label">Pressure</div>
      <div class="stat-value" id="press">--<span class="stat-unit">hPa</span></div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" class="search-input" id="input" placeholder="Search for a city..." autocomplete="off">
      <button class="search-btn" onclick="searchCity()">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
  </div>

  <!-- Popular Cities -->
  <div class="popular-cities">
    <span class="city-tag" onclick="quickSearch('london')"><i class="fas fa-crown"></i> London</span>
    <span class="city-tag" onclick="quickSearch('new york')"><i class="fas fa-building"></i> New York</span>
    <span class="city-tag" onclick="quickSearch('tokyo')"><i class="fas fa-torii-gate"></i> Tokyo</span>
    <span class="city-tag" onclick="quickSearch('paris')"><i class="fas fa-wine-bottle"></i> Paris</span>
    <span class="city-tag" onclick="quickSearch('dubai')"><i class="fas fa-umbrella-beach"></i> Dubai</span>
    <span class="city-tag" onclick="quickSearch('sydney')"><i class="fas fa-water"></i> Sydney</span>
  </div>

  <!-- Last Updated -->
  <div class="last-updated" id="time">
    <i class="far fa-clock"></i> 
    <span>Loading weather data...</span>
  </div>

</div>

<script>
// Configuration
const API_URL = 'http://localhost/Weather/myapi2.php';
let currentCity = 'london';

// DOM Elements
const card = document.getElementById('card');
const cityEl = document.getElementById('city');
const tempEl = document.getElementById('temp');
const descEl = document.getElementById('desc');
const feelsEl = document.getElementById('feels');
const humEl = document.getElementById('hum');
const windEl = document.getElementById('wind');
const pressEl = document.getElementById('press');
const timeEl = document.getElementById('time');
const iconEl = document.getElementById('icon');

// Icon mapping
const iconMap = {
  '01d': 'fa-sun', '01n': 'fa-moon',
  '02d': 'fa-cloud-sun', '02n': 'fa-cloud-moon',
  '03d': 'fa-cloud', '03n': 'fa-cloud',
  '04d': 'fa-cloud', '04n': 'fa-cloud',
  '09d': 'fa-cloud-rain', '09n': 'fa-cloud-rain',
  '10d': 'fa-cloud-showers-heavy', '10n': 'fa-cloud-showers-heavy',
  '11d': 'fa-bolt', '11n': 'fa-bolt',
  '13d': 'fa-snowflake', '13n': 'fa-snowflake',
  '50d': 'fa-smog', '50n': 'fa-smog'
};

// Load weather data
async function loadWeather(city) {
  // Show loading state
  card.classList.add('loading');
  
  try {
    const response = await fetch(`${API_URL}?city=${encodeURIComponent(city)}`);
    const data = await response.json();
    
    if (data.error) {
      showError('City not found. Please check the spelling.');
      return;
    }
    
    // Update UI with weather data
    updateUI(data);
    
  } catch (error) {
    console.error('Error:', error);
    showError('Network error. Make sure XAMPP is running.');
  } finally {
    card.classList.remove('loading');
  }
}

// Update UI elements
function updateUI(data) {
  // Format city name (capitalize each word)
  const cityWords = data.city.split(' ').map(word => 
    word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
  ).join(' ');
  
  cityEl.innerHTML = `<i class="fas fa-map-pin"></i> ${cityWords}`;
  tempEl.innerText = `${Math.round(data.weather_temperature)}°C`;
  descEl.innerText = capitalizeEachWord(data.weather_description);
  feelsEl.innerHTML = `${Math.round(data.feels_like)}<span class="stat-unit">°C</span>`;
  humEl.innerHTML = `${data.humidity}<span class="stat-unit">%</span>`;
  windEl.innerHTML = `${data.weather_wind}<span class="stat-unit">m/s</span>`;
  pressEl.innerHTML = `${data.pressure}<span class="stat-unit">hPa</span>`;
  
  // Update icon
  const iconCode = data.icon || '02d';
  iconEl.className = `fas ${iconMap[iconCode] || 'fa-cloud'}`;
  
  // Update timestamp
  updateTimestamp();
}

// Helper: Capitalize each word
function capitalizeEachWord(text) {
  return text.split(' ').map(word => 
    word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
  ).join(' ');
}

// Update timestamp
function updateTimestamp() {
  const now = new Date();
  const timeString = now.toLocaleTimeString('en-US', { 
    hour: '2-digit', 
    minute: '2-digit',
    second: '2-digit'
  });
  
  const dateString = now.toLocaleDateString('en-US', {
    day: 'numeric',
    month: 'short'
  });
  
  timeEl.innerHTML = `<i class="far fa-clock"></i> Last updated: ${dateString} at ${timeString}`;
}

// Show error message
function showError(message) {
  // Remove existing error toast
  const existingToast = document.querySelector('.error-toast');
  if (existingToast) existingToast.remove();
  
  // Create new error toast
  const toast = document.createElement('div');
  toast.className = 'error-toast';
  toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
  document.body.appendChild(toast);
  
  // Auto-remove after 3 seconds
  setTimeout(() => {
    toast.style.animation = 'slideUp 0.3s reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// Search functions
function searchCity() {
  const input = document.getElementById('input');
  const city = input.value.trim();
  
  if (city) {
    currentCity = city;
    loadWeather(currentCity);
    input.value = '';
  } else {
    showError('Please enter a city name');
  }
}

function quickSearch(city) {
  currentCity = city;
  loadWeather(currentCity);
}

function refreshWeather() {
  loadWeather(currentCity);
}

// Handle Enter key
document.getElementById('input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    searchCity();
  }
});

// Auto-refresh every 10 minutes
setInterval(() => {
  if (currentCity) {
    loadWeather(currentCity);
  }
}, 600000);

// Initialize with default city
loadWeather(currentCity);
</script>

</body>
</html>

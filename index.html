<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>SkySense • Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

:root {
--primary: #3b82f6;
--primary-dark: #2563eb;
--bg-start: #0b1120;
--bg-end: #1a2a4a;
--glass: rgba(255, 255, 255, 0.07);
--text-primary: #ffffff;
--text-secondary: #94a3b8;
--radius: 28px;
}

body {
font-family: 'Inter', sans-serif;
background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
color: var(--text-primary);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 12px;
width: 100%;
}

/* Main card */
.main-card {
width: 100%;
max-width: 400px;
background: var(--glass);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-radius: var(--radius);
padding: 20px 18px;
border: 1px solid rgba(255, 255, 255, 0.08);
}

/* Header */
.header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
}

.logo {
font-weight: 700;
font-size: 20px;
display: flex;
align-items: center;
}

.logo i {
color: var(--primary);
margin-right: 6px;
font-size: 20px;
}

.city-badge {
background: var(--primary);
padding: 6px 14px;
border-radius: 30px;
font-size: 14px;
font-weight: 600;
display: inline-flex;
align-items: center;
gap: 6px;
white-space: nowrap;
max-width: 180px;
overflow: hidden;
text-overflow: ellipsis;
}

.city-badge span {
overflow: hidden;
text-overflow: ellipsis;
}

.refresh-btn {
background: rgba(255, 255, 255, 0.1);
border: none;
color: white;
width: 38px;
height: 38px;
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
margin-left: 6px;
cursor: pointer;
flex-shrink: 0;
}

.refresh-btn:active {
background: var(--primary);
transform: rotate(180deg);
}

/* Weather icon */
.icon-wrapper {
text-align: center;
margin: 0;
}

.icon-wrapper i {
font-size: 90px;
color: white;
filter: drop-shadow(0 5px 15px rgba(59, 130, 246, 0.4));
}

/* Temperature */
.temperature {
font-size: 52px;
font-weight: 700;
text-align: center;
line-height: 1.1;
margin: 0;
}

.description {
text-align: center;
color: var(--text-secondary);
font-size: 18px;
margin-bottom: 15px;
text-transform: capitalize;
}

/* Stats grid */
.stats-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 8px;
margin-bottom: 15px;
}

.stat-card {
background: rgba(255, 255, 255, 0.05);
border-radius: 18px;
padding: 12px 8px;
text-align: center;
}

.stat-card i {
font-size: 20px;
color: var(--primary);
margin-bottom: 4px;
}

.stat-label {
color: var(--text-secondary);
font-size: 11px;
text-transform: uppercase;
margin-bottom: 2px;
}

.stat-value {
font-size: 18px;
font-weight: 600;
}

.stat-unit {
font-size: 11px;
color: var(--text-secondary);
margin-left: 2px;
}

/* Search */
.search-wrapper {
margin-top: 15px;
}

.search-box {
display: flex;
gap: 8px;
}

.search-input {
flex: 1;
padding: 12px 16px;
border: 1px solid rgba(255, 255, 255, 0.1);
background: rgba(255, 255, 255, 0.05);
border-radius: 30px;
color: white;
font-size: 14px;
}

.search-input::placeholder {
color: var(--text-secondary);
}

.search-btn {
padding: 12px 18px;
border: none;
background: var(--primary);
color: white;
font-weight: 600;
border-radius: 30px;
cursor: pointer;
font-size: 14px;
white-space: nowrap;
flex-shrink: 0;
}

.search-btn:active {
background: var(--primary-dark);
transform: scale(0.97);
}

/* Popular cities */
.popular-cities {
display: flex;
flex-wrap: wrap;
gap: 6px;
justify-content: center;
margin-top: 12px;
}

.city-tag {
padding: 6px 12px;
background: rgba(255, 255, 255, 0.05);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 30px;
color: var(--text-secondary);
font-size: 12px;
cursor: pointer;
}

.city-tag:active {
background: var(--primary);
color: white;
}

/* Last updated */
.last-updated {
margin-top: 15px;
padding-top: 12px;
border-top: 1px solid rgba(255, 255, 255, 0.1);
text-align: center;
color: var(--text-secondary);
font-size: 11px;
}

/* Loading state */
.loading {
opacity: 0.6;
pointer-events: none;
}

/* Error toast */
.error-toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background: rgba(239, 68, 68, 0.95);
color: white;
padding: 10px 20px;
border-radius: 40px;
font-size: 13px;
z-index: 1000;
max-width: 90%;
text-align: center;
animation: slideUp 0.3s ease;
}

@keyframes slideUp {
from {
opacity: 0;
transform: translate(-50%, 20px);
}
to {
opacity: 1;
transform: translate(-50%, 0);
}
}

/* Success toast */
.success-toast {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background: rgba(34, 197, 94, 0.95);
color: white;
padding: 10px 20px;
border-radius: 40px;
font-size: 13px;
z-index: 1000;
max-width: 90%;
text-align: center;
animation: slideUp 0.3s ease;
}

/* Very small phones */
@media (max-width: 360px) {
  .main-card {
    padding: 15px 12px;
  }
  
  .icon-wrapper i {
    font-size: 70px;
  }
  
  .temperature {
    font-size: 44px;
  }
  
  .description {
    font-size: 16px;
    margin-bottom: 12px;
  }
  
  .search-box {
    flex-direction: column;
  }
  
  .search-btn {
    width: 100%;
  }
}

/* Landscape mode */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    padding: 8px;
  }
  
  .main-card {
    max-width: 100%;
    padding: 12px;
  }
  
  .icon-wrapper i {
    font-size: 50px;
  }
  
  .temperature {
    font-size: 36px;
  }
  
  .stats-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* Touch targets */
button, .city-tag {
  min-height: 40px;
}
</style>
</head>
<body>

<div class="main-card" id="card">
  
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <i class="fas fa-cloud-moon"></i> SkySense
    </div>
    <div style="display: flex; align-items: center;">
      <span class="city-badge" id="city">
        <i class="fas fa-map-pin"></i> <span id="cityName">London</span>
      </span>
      <button class="refresh-btn" onclick="refreshWeather()">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>
  </div>

  <!-- Weather Icon -->
  <div class="icon-wrapper">
    <i class="fas fa-cloud-sun" id="icon"></i>
  </div>

  <!-- Temperature & Description -->
  <div class="temperature" id="temp">--°C</div>
  <div class="description" id="desc">Loading...</div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-thermometer-half"></i>
      <div class="stat-label">Feels</div>
      <div class="stat-value" id="feels">--<span class="stat-unit">°C</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-tint"></i>
      <div class="stat-label">Humidity</div>
      <div class="stat-value" id="hum">--<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-wind"></i>
      <div class="stat-label">Wind</div>
      <div class="stat-value" id="wind">--<span class="stat-unit">m/s</span></div>
    </div>
    <div class="stat-card">
      <i class="fas fa-compress-alt"></i>
      <div class="stat-label">Pressure</div>
      <div class="stat-value" id="press">--<span class="stat-unit">hPa</span></div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" class="search-input" id="input" placeholder="e.g., London, Paris, New York" autocomplete="off">
      <button class="search-btn" onclick="searchCity()">Search</button>
    </div>
  </div>

  <!-- Popular Cities -->
  <div class="popular-cities">
    <span class="city-tag" onclick="quickSearch('london')">London</span>
    <span class="city-tag" onclick="quickSearch('new york')">New York</span>
    <span class="city-tag" onclick="quickSearch('tokyo')">Tokyo</span>
    <span class="city-tag" onclick="quickSearch('paris')">Paris</span>
    <span class="city-tag" onclick="quickSearch('dubai')">Dubai</span>
    <span class="city-tag" onclick="quickSearch('birmingham')">Birmingham</span>
  </div>

  <!-- Last Updated -->
  <div class="last-updated" id="time">
    <i class="far fa-clock"></i> Loading...
  </div>

</div>

<script>
// Configuration
const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
const API_URL = isLocalhost ? 'http://localhost/Weather/myapi2.php' : '/weather/myapi2.php';
let currentCity = 'london';
let retryCount = 0;
const MAX_RETRIES = 2;

// DOM Elements
const card = document.getElementById('card');
const cityNameEl = document.getElementById('cityName');
const tempEl = document.getElementById('temp');
const descEl = document.getElementById('desc');
const feelsEl = document.getElementById('feels');
const humEl = document.getElementById('hum');
const windEl = document.getElementById('wind');
const pressEl = document.getElementById('press');
const timeEl = document.getElementById('time');
const iconEl = document.getElementById('icon');

// Icon mapping
const iconMap = {
  '01d': 'fa-sun', '01n': 'fa-moon',
  '02d': 'fa-cloud-sun', '02n': 'fa-cloud-moon',
  '03d': 'fa-cloud', '03n': 'fa-cloud',
  '04d': 'fa-cloud', '04n': 'fa-cloud',
  '09d': 'fa-cloud-rain', '09n': 'fa-cloud-rain',
  '10d': 'fa-cloud-showers-heavy', '10n': 'fa-cloud-showers-heavy',
  '11d': 'fa-bolt', '11n': 'fa-bolt',
  '13d': 'fa-snowflake', '13n': 'fa-snowflake',
  '50d': 'fa-smog', '50n': 'fa-smog'
};

// City search variations to try
async function tryCityVariations(originalCity) {
  const variations = [];
  const city = originalCity.toLowerCase().trim();
  
  // Add the original
  variations.push(city);
  
  // Try with common country codes for ambiguous cities
  if (city === 'birmingham') {
    variations.push('birmingham,uk');
    variations.push('birmingham,al');
    variations.push('birmingham,us');
  } else if (city.includes(' ')) {
    // For cities with spaces, try with commas
    variations.push(city.replace(' ', ','));
    variations.push(city.replace(' ', ''));
  }
  
  // Try each variation
  for (let variant of variations) {
    try {
      const response = await fetch(`${API_URL}?city=${encodeURIComponent(variant)}&t=${Date.now()}`);
      const data = await response.json();
      
      if (!data.error && data.weather_temperature) {
        return data;
      }
    } catch (e) {
      continue;
    }
  }
  
  return null;
}

// Load weather data
async function loadWeather(city) {
  card.classList.add('loading');
  
  try {
    // First attempt with original
    let response = await fetch(`${API_URL}?city=${encodeURIComponent(city)}&t=${Date.now()}`);
    let data = await response.json();
    
    // If failed, try variations
    if (data.error || !data.weather_temperature) {
      data = await tryCityVariations(city);
    }
    
    if (!data || data.error) {
      showError(`Could not find "${city}". Try being more specific (e.g., "Birmingham, UK")`);
      return;
    }
    
    // Update UI
    updateUI(data);
    retryCount = 0;
    
  } catch (error) {
    console.error('Error:', error);
    
    if (retryCount < MAX_RETRIES) {
      retryCount++;
      setTimeout(() => loadWeather(city), 1000);
    } else {
      showError('Network error. Please try again.');
    }
  } finally {
    card.classList.remove('loading');
  }
}

// Update UI
function updateUI(data) {
  // Format city name properly
  const cityWords = data.city.split(' ').map(word => 
    word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
  ).join(' ');
  
  cityNameEl.textContent = cityWords;
  
  // Update values with fallbacks
  tempEl.innerText = data.weather_temperature ? Math.round(data.weather_temperature) + '°C' : '--°C';
  descEl.innerText = data.weather_description || 'Unknown';
  feelsEl.innerHTML = (data.feels_like ? Math.round(data.feels_like) : '--') + '<span class="stat-unit">°C</span>';
  humEl.innerHTML = (data.humidity || '--') + '<span class="stat-unit">%</span>';
  windEl.innerHTML = (data.weather_wind || '--') + '<span class="stat-unit">m/s</span>';
  pressEl.innerHTML = (data.pressure || '--') + '<span class="stat-unit">hPa</span>';
  
  // Update icon
  const iconCode = data.icon || '02d';
  iconEl.className = `fas ${iconMap[iconCode] || 'fa-cloud'}`;
  
  // Update time
  const now = new Date();
  timeEl.innerHTML = `<i class="far fa-clock"></i> ${now.toLocaleTimeString()}`;
  
  currentCity = data.city.toLowerCase();
}

// Show error
function showError(message) {
  const existing = document.querySelector('.error-toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'error-toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.remove(), 3000);
}

// Show success
function showSuccess(message) {
  const toast = document.createElement('div');
  toast.className = 'success-toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

// Search functions
function searchCity() {
  const input = document.getElementById('input');
  const city = input.value.trim();
  
  if (city) {
    currentCity = city;
    loadWeather(currentCity);
    input.value = '';
  } else {
    showError('Please enter a city name');
  }
}

function quickSearch(city) {
  currentCity = city;
  loadWeather(currentCity);
}

function refreshWeather() {
  loadWeather(currentCity);
}

// Enter key
document.getElementById('input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchCity();
});

// Initialize
loadWeather(currentCity);
</script>

</body>
</html>
